# Learn more about configuring your app at https://shopify.dev/docs/apps/tools/cli/configuration
#
# Vendor MAP Pricing (custom app, single store).
# `client_id` / `application_url` are managed by `shopify app dev` / `link`.

client_id = "ebb28b4dd7e0d36afb421a640621992b"
name = "vendor-map-app"
application_url = "https://vendor-map-price-app.fly.dev"
embedded = true

[access_scopes]
# read/write_products: list variants + update actual_price / map_enabled metafields.
# read/write_cart_transforms: list + create the cart transform (activation).
scopes = "read_products,write_products,read_cart_transforms,write_cart_transforms"

[auth]
redirect_urls = [ "https://vendor-map-price-app.fly.dev/auth/callback", "https://vendor-map-price-app.fly.dev/api/auth" ]

[webhooks]
api_version = "2026-07"

  [[webhooks.subscriptions]]
  uri = "/webhooks/app/uninstalled"
  topics = [ "app/uninstalled" ]

  [[webhooks.subscriptions]]
  uri = "/webhooks/app/scopes_update"
  topics = [ "app/scopes_update" ]

  # Mandatory GDPR / privacy compliance webhooks (required even for custom apps).
  # Subscribed via `compliance_topics`; each handler validates HMAC, logs, and 200s.
  [[webhooks.subscriptions]]
  uri = "/webhooks/customers/data_request"
  compliance_topics = [ "customers/data_request" ]

  [[webhooks.subscriptions]]
  uri = "/webhooks/customers/redact"
  compliance_topics = [ "customers/redact" ]

  [[webhooks.subscriptions]]
  uri = "/webhooks/shop/redact"
  compliance_topics = [ "shop/redact" ]

# ---------------------------------------------------------------------------
# App-owned variant metafield definitions are intentionally NOT declared here.
#
# `shopify app deploy` does not install `[variant.metafields.app.*]` blocks — the
# CLI silently ignores them (verified on a live store: the app's metafield *values*
# persisted, but the definitions never registered and showed as "Unstructured").
# They are created at runtime instead: app/lib/metafieldDefinitions.server.ts, run
# from afterAuth + a Settings button, or scripts/register-metafield-definitions.mjs.
#
# The definitions live in the reserved `$app` namespace (`app--{id}`, which grants
# the Cart Transform Function implicit read access), ownerType PRODUCTVARIANT:
# keys `actual_price` (money) and `map_enabled` (boolean).
# Access: `actual_price` is admin-only (merchant_read_write) — the real price must
# NEVER reach the storefront (MAP compliance). `map_enabled` is additionally
# storefront-readable (PUBLIC_READ) so the `map-price-notice` theme app extension
# can detect MAP variants in Liquid (`variant.metafields.app.map_enabled`).
# Note: `variant.price` IS the MAP — we do not duplicate it as a metafield.
# ---------------------------------------------------------------------------

[build]
include_config_on_deploy = true
automatically_update_urls_on_dev = true
